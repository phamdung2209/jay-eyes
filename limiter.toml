# Jay Eyes — SearXNG bot-detection limiter config.
# Only used when settings.yml has `server.limiter: true`. We keep that
# off (Jay handles rate limits upstream), but the file ships in case
# an operator flips the flag.

[botdetection.ip_limit]
filter_link_local = false
link_token = false

[botdetection.ip_lists]
block_ip = []
pass_ip = []

[real_ip]
# Render puts the real client IP in X-Forwarded-For. Trust one proxy
# hop (Render's edge) so a single egress IP doesn't get treated as
# one "user".
x_for = 1
ipv4_prefix = 32
ipv6_prefix = 56
